name: Preprocess Superstore Data

on: [push]

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pandas matplotlib seaborn scikit-learn

      - name: Run preprocessing
        working-directory: preprocessing
        run: python automate_Rizky_Zhang.py

      - name: Upload preprocessed CSV as artifact
        uses: actions/upload-artifact@v7
        with:
          name: preprocessed-data
          path: preprocessing/sample_superstore_preprocessing.csv
